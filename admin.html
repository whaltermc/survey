<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Response Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="page-analytics">
<div class="wrap">
  <div class="eyebrow">Aggregate results</div>
  <h1>Response Analytics</h1>
  <p class="sub">A live view of everyone's answers to the survey.</p>

  <!-- Login gate: shown until an admin signs in -->
  <div class="card" id="loginScreen">
    <h2 style="margin:0 0 16px;">Admin sign-in</h2>
    <input type="password" id="adminPassword" placeholder="Password" autocomplete="current-password"
      style="width:100%; border:1px solid var(--line); border-radius:10px; padding:12px 14px; font-size:15px; margin-bottom:14px; background:#fff; color:var(--ink);">
    <button class="btn-next" id="loginBtn" style="width:100%;">Sign in</button>
    <div class="status" id="loginStatus"></div>
  </div>

  <!-- Everything below only shows after successful sign-in -->
  <div id="analyticsWrap" style="display:none;">
    <div class="privacy-note">
      ⚠️ This page shows raw, unfiltered responses including free-text answers. It's gated behind admin sign-in — don't share your password.
    </div>

    <div class="actions" style="margin-bottom:20px;">
      <button class="refresh" id="refreshBtn">↻ Refresh data</button>
      <button class="btn-back" id="logoutBtn">Sign out</button>
    </div>

    <div id="loading" class="status">Loading responses…</div>
    <div id="content" style="display:none;">

      <!-- Headline numbers, filled in by script.js -->
      <div class="grid" id="statsGrid"></div>

      <!-- One card per survey question, generated from QUESTIONS in script.js -->
      <div id="questionsContainer"></div>

    </div>
  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
